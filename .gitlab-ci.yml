before_script:
  - echo "Before script"
  # - cd /www/wwwroot/gariin.com
building:
  stage: build
  script:
    - git reset --hard
    - git pull origin master
    # - composer install
    # - cp .env.example .env
    # - php artisan key:generate
    # - php artisan migrate --seed
    - /www/server/php/74/bin/php artisan cache:clear
    - /www/server/php/74/bin/php artisan config:clear
    - /www/server/php/74/bin/php artisan view:cache
    # - php art
    # - php artisan storage:link
    - sudo chown -R www:www /www/wwwroot/gariin.com/
    - find /www/wwwroot/gariin.com -type f -exec chmod 664 {} \;
    - find /www/wwwroot/gariin.com -type d -exec chmod 775 {} \;
    - chgrp -R www-data storage bootstrap/cache
    - chmod -R ug+rwx storage bootstrap/cache
