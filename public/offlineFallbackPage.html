<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>عدم اتصال به اینترنت</title>
    <link rel="stylesheet" href="/packages/line-awesome/css/line-awesome.min.css" />
    <link rel="stylesheet" href="/packages/iransans/dist/css/fontiran.css" />

    <style>
        body {
            width: 100%;
            min-height: 100vh;
            display: relative;
            font-family: 'IRANSans';
            margin: 0;
            padding: 0;
            background: -webkit-linear-gradient(-45deg, #183850 0, #183850 25%, #192C46 50%, #22254C 75%, #22254C 100%);
        }
        
        .wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            align-items: center;
            justify-content: center;
            -webkit-transform: translate(-50%, -50%);
            -moz-transform: translate(-50%, -50%);
            -ms-transform: translate(-50%, -50%);
            -o-transform: translate(-50%, -50%);
            transform: translate(-50%, -50%);
            text-align: center;
        }
        
        h1 {
            color: white;
            font-family: arial;
            font-weight: bold;
            font-size: 50px;
            letter-spacing: 5px;
            text-shadow: 0 0 3px white;
        }
        
        h4 {
            color: #f1f1f1;
            font-weight: 300;
            font-size: 16px;
        }
        
        .button {
            display: block;
            margin: 20px 0 0;
            padding: 15px 30px;
            background: #43ca5a;
            color: white;
            border-radius: .4rem;
            text-decoration: none;
            box-shadow: 0 0 15px #22254C;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <h1>عدم اتصال به اینترنت</h1>
        <h4>اتصال شما به اینترنت برقرار نیست. برای استفاده از سرویس گرین به اینترنت متصل شوید</h4>

        <a href="." class="button">تلاش مجدد</a>
    </div>
</body>

</html>
